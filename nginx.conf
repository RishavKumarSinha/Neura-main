server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # GZIP COMPRESSION (Performance)
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/wasm;

    # ==========================================================================
    # 1. MAIN FLUTTER WEB APP
    # ==========================================================================
    location / {
        # SPA Routing: If file not found, serve index.html
        try_files $uri $uri/ /index.html;

        # SECURITY & PERFORMANCE HEADERS
        # Required for Flutter WASM / CanvasKit to use SharedArrayBuffer
        add_header X-Docker-Environment "true" always;

        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        
        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;
        # XSS Protection
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ==========================================================================
    # 2. ANDROID APK DOWNLOAD
    # ==========================================================================
    location /neuro.apk {
        # Force download instead of displaying binary
        add_header Content-Disposition 'attachment; filename="neuro.apk"';
        default_type application/vnd.android.package-archive;
        
        access_log off; # Reduce noise in logs
        expires 0;      # Do not cache the APK (always get latest)
    }

    # ==========================================================================
    # 3. ASSET CACHING (Long-term)
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|ttf|otf|wasm|json)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
        
        # Ensure WASM headers are applied to assets too
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ==========================================================================
    # ERROR HANDLING
    # ==========================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}