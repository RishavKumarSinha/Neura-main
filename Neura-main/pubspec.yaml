name: neuro
description: "Neuro"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # pub-dev dependencies
  flutter_gemma: ^0.9.0 # The most important dependency

  image_picker: ^1.0.4
  flutter_markdown: ^0.7.1
  url_launcher: ^6.3.1
  http: ^1.3.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  flutter_tts: ^4.2.3
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  speech_to_text: ^7.0.0  # <--- ADD THIS
  permission_handler: ^11.3.0 # <--- ADD THIS (for microphone permission)
  flutter_animate: ^4.5.0
  video_thumbnail: ^0.5.3
  image: ^4.2.0
  google_generative_ai: ^0.4.4
  confetti: ^0.7.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.6
  flutter_secure_storage: ^9.0.0 # For saving the API Key safely
  cloud_firestore: ^4.14.0       # To save patient details
  encrypt: ^5.0.3
  

  

  # Vision & AR
  camera: ^0.10.5+9


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/OpenDyslexic-Regular.otf

  assets:
    - assets/strings_it.json
    - assets/strings_en.json
    - assets/strings_fr.json
    - assets/strings_es.json
    - assets/strings_de.json
    - assets/lingue_supportate.json
    - assets/gemma.png
    - assets/logo-gemma.png
    # - assets/riordinare.png
    - assets/nox.png
    - assets/neuro.png
    - assets/gemma-3n.png
    - assets/order_room_prompt_it.json
    - assets/order_room_prompt_en.json
    - assets/order_room_prompt_fr.json
    - assets/order_room_prompt_es.json
    - assets/order_room_prompt_de.json
    - assets/generic_prompt_en.json
    

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/nox.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/nox.png"
    background_color: "#ffffff"
    theme_color: "#2196F3"
  windows:
    generate: true
    image_path: "assets/nox.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/nox.png"